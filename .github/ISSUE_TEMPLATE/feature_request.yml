name: Feature request
description: Suggest an enhancement, new format or source, or documentation improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and why is current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, format, source, or documentation change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Document and bibliography parsing
        - Identifier normalization
        - Matching
        - Sources and backends
        - Offline snapshot
        - Reports
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link data-source records, format specifications, examples, or related issues.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement or test this.
          required: false
